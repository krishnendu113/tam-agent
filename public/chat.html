<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - TAM Agent</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <a href="#chat-input" class="skip-link">Skip to chat input</a>

    <div class="page-layout">
        <!-- Navigation bar placeholder (populated by nav.js) -->
        <div id="navbar"></div>

        <!-- Chat layout: sidebar + main area -->
        <div class="chat-layout">
            <!-- Sidebar toggle button (visible only on mobile) -->
            <button
                class="sidebar-toggle"
                id="sidebar-toggle"
                type="button"
                aria-label="Toggle conversation sidebar"
                aria-expanded="false"
                aria-controls="conversation-sidebar"
            >
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                    <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>

            <!-- Sidebar overlay backdrop (mobile) -->
            <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

            <!-- Conversation sidebar (left panel) -->
            <aside
                class="sidebar"
                id="conversation-sidebar"
                role="complementary"
                aria-label="Conversation history"
            >
                <div class="sidebar-header">
                    <span class="sidebar-title">Conversations</span>
                    <button
                        class="btn btn-sm btn-primary"
                        id="new-conversation-btn"
                        type="button"
                        aria-label="Start a new conversation"
                    >
                        New Conversation
                    </button>
                </div>

                <!-- Scrollable conversation list -->
                <nav class="sidebar-list" id="conversation-list" aria-label="Conversation list">
                    <!-- Conversation items will be populated by chat.js -->
                </nav>
            </aside>

            <!-- Main chat area -->
            <main class="chat-main" aria-label="Chat area">
                <!-- Scrollable message display area -->
                <div class="chat-messages" id="chat-messages" aria-live="polite" aria-atomic="false">
                    <div class="chat-messages-inner" id="chat-messages-inner">
                        <!-- Messages will be rendered here by chat.js -->
                        <div class="empty-state" id="chat-empty-state">
                            <div class="empty-state-icon" aria-hidden="true">💬</div>
                            <p class="empty-state-title">Start a conversation</p>
                            <p class="empty-state-text">Send a message to begin chatting with TAM Agent.</p>
                        </div>
                    </div>
                </div>

                <!-- Fixed input area at bottom -->
                <div class="chat-input-area">
                    <div class="chat-input-wrapper">
                        <label for="chat-input" class="sr-only">Type your message</label>
                        <textarea
                            class="chat-input"
                            id="chat-input"
                            placeholder="Type your message..."
                            rows="1"
                            aria-label="Message input"
                        ></textarea>
                        <button
                            class="btn btn-primary"
                            id="send-btn"
                            type="button"
                            aria-label="Send message"
                        >
                            Send
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
