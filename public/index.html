<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TAM Agent</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <a href="#login-form" class="skip-link">Skip to login form</a>

    <div class="flex flex-col items-center justify-center" style="min-height: 100vh; padding: var(--space-lg);">
        <div class="login-card card" role="main" aria-label="Login">
            <div class="card-header" style="text-align: center; border-bottom: none; padding-bottom: 0;">
                <h1 class="card-title">TAM Agent</h1>
                <p class="text-sm text-muted mt-sm">Sign in to continue</p>
            </div>

            <div class="card-body">
                <!-- Error message display area -->
                <div id="error-message" class="alert alert-error hidden" role="alert" aria-live="polite"></div>

                <!-- Google OAuth button -->
                <a href="/auth/google" class="btn btn-google btn-block" aria-label="Sign in with Google">
                    <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
                        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                        <path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/>
                        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
                    </svg>
                    Sign in with Google
                </a>

                <!-- Divider -->
                <div class="form-divider">or</div>

                <!-- Admin login form -->
                <form id="login-form" method="POST" action="/api/auth/admin-login" aria-label="Admin login form">
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-input"
                            placeholder="admin@capillarytech.com"
                            required
                            autocomplete="email"
                            aria-required="true"
                        >
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                            aria-required="true"
                        >
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                        Sign in
                    </button>
                </form>

                <!-- Link to About page -->
                <p class="text-sm text-muted mt-lg" style="text-align: center;">
                    <a href="/about.html" aria-label="Learn more about TAM Agent">About TAM Agent</a>
                </p>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
    (function () {
        'use strict';

        var errorEl = document.getElementById('error-message');
        var loginForm = document.getElementById('login-form');
        var loginBtn = document.getElementById('login-btn');
        var countdownInterval = null;

        // 1. If already authenticated, redirect to chat
        if (isAuthenticated()) {
            window.location.href = '/chat.html';
            return;
        }

        // 2. Check URL hash for token or error from OAuth callback
        var hash = window.location.hash;
        if (hash) {
            if (hash.indexOf('#token=') === 0) {
                var token = hash.substring(7);
                if (token) {
                    setToken(token);
                    // Clear hash from URL
                    history.replaceState(null, '', window.location.pathname);
                    window.location.href = '/chat.html';
                    return;
                }
            } else if (hash.indexOf('#error=') === 0) {
                var errorMsg = decodeURIComponent(hash.substring(7));
                showError(errorMsg);
                // Clear hash from URL
                history.replaceState(null, '', window.location.pathname);
            }
        }

        // 3. Form submit handler
        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();
            hideError();

            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Please enter both email and password.');
                return;
            }

            // Disable button during request
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';

            fetch('/api/auth/admin-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            })
            .then(function (response) {
                if (response.ok) {
                    return response.json().then(function (data) {
                        setToken(data.token);
                        window.location.href = '/chat.html';
                    });
                }

                return response.json().then(function (data) {
                    switch (response.status) {
                        case 401:
                            showError(data.error || 'Invalid credentials');
                            break;
                        case 423:
                            showLockout(data.retryAfter || 900);
                            break;
                        case 403:
                            showError(data.error || 'Account is disabled. Please contact an administrator.');
                            break;
                        default:
                            showError(data.error || 'An unexpected error occurred. Please try again.');
                    }
                });
            })
            .catch(function () {
                showError('Connection error. Please check your network and try again.');
            })
            .finally(function () {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign in';
            });
        });

        /**
         * Display an error message in the error area.
         * @param {string} message
         */
        function showError(message) {
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');
        }

        /**
         * Hide the error message area.
         */
        function hideError() {
            errorEl.textContent = '';
            errorEl.classList.add('hidden');
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
        }

        /**
         * Display a lockout message with a countdown timer.
         * @param {number} retryAfter - Seconds until lockout expires
         */
        function showLockout(retryAfter) {
            var remaining = Math.ceil(retryAfter);
            updateLockoutMessage(remaining);
            errorEl.classList.remove('hidden');

            // Clear any existing countdown
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }

            countdownInterval = setInterval(function () {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    hideError();
                } else {
                    updateLockoutMessage(remaining);
                }
            }, 1000);
        }

        /**
         * Update the lockout message text with remaining time.
         * @param {number} seconds
         */
        function updateLockoutMessage(seconds) {
            var minutes = Math.floor(seconds / 60);
            var secs = seconds % 60;
            var timeStr = minutes > 0
                ? minutes + 'm ' + secs + 's'
                : secs + 's';
            errorEl.textContent = 'Account is locked due to too many failed attempts. Try again in ' + timeStr + '.';
        }
    })();
    </script>
</body>
</html>
